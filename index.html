<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🍄 Nấm Homestay</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#A8CFA8;
padding:16px;
color:white;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:6px;
}

.subtitle{
margin-bottom:20px;
opacity:0.9;
}

.month{
font-size:22px;
font-weight:bold;
margin-bottom:14px;
}

.calendar{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:10px;
margin-bottom:20px;
}

.day{
min-width:80px;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.2);
text-align:center;
font-weight:bold;
cursor:pointer;
}

.day.active{
background:white;
color:#4d6b4d;
}

.layout{
display:grid;
gap:20px;
}

@media(min-width:1000px){

.layout{
grid-template-columns:1.1fr 0.9fr;
}

}

.section{
background:white;
color:#222;
border-radius:24px;
padding:18px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
}

.sheet{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
padding-bottom:14px;
text-align:center;
color:#777;
}

td{
padding:10px;
border-top:1px solid #eee;
text-align:center;
background:white;
}

.room{
font-weight:bold;
text-align:left;
min-width:140px;
font-size:18px;
color:#2f5233;
background:#edf6ee;
position:sticky;
left:0;
z-index:2;
}

.slot{
background:#f5f5f5;
border-radius:14px;
padding:10px;
cursor:pointer;
min-width:150px;
transition:0.2s;
}

.slot.active{
background:#d8f5d8;
border:2px solid #69b96d;
}

.slot:hover{
background:#ececec;
}

.slot-time{
font-weight:bold;
font-size:15px;
}

.slot-guest{
margin-top:8px;
font-size:13px;
color:#555;
}

.timeline{
display:flex;
flex-direction:column;
gap:12px;

overflow:auto;
}

.event{
padding:18px;
border-radius:20px;

justify-content:space-between;

}

.normal{

}

.red{
background:#ffc9c9;
}

.green{

}

.time{

}

}

}

justify-content:center;

z-index:999;
}

.popup-box{
background:white;
color:black;
width:100%;

}

.popup-title{

}

</style>
</head>

<body>

<div class="title">
🍄 Nấm Homestay
</div>

<div class="subtitle">
Operation Dashboard
</div>

<div class="month">
May / June 2025
</div>

<div class="calendar" id="calendar"></div>

<div class="layout">

<div class="section">

<div class="section-title">
📋 Booking Sheet
</div>

<div class="sheet">

<table>

<tr>
<th>Room</th>
<th>Ca 1</th>
<th>Ca 2</th>
<th>Ca 3</th>
<th>Đêm</th>
</tr>

<tbody id="bookingTable"></tbody>

</table>

</div>

</div>

<div class="section">

<div class="section-title">
⏳ Timeline dọn phòng
</div>

<div class="timeline" id="timeline"></div>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<div class="popup-title" id="popupTitle">
Booking
</div>

<input id="guestName" placeholder="Tên khách"/>

<textarea id="guestNote"
placeholder="Ghi chú"></textarea>

<button onclick="saveBooking()">
Lưu booking
</button>

</div>

</div>

<script>

const rooms = {

Midori:[
["10:00","13:00"],
["13:30","16:30"],
["17:00","20:00"],
["20:30","09:30"]
],

Truffle:[
["10:30","13:30"],
["14:00","17:00"],
["17:30","20:30"],
["21:00","10:00"]
],

Matutake:[
["11:00","14:00"],
["14:30","17:30"],
["18:00","21:00"],
["21:30","10:30"]
],

Porcini:[
["11:30","14:30"],
["15:00","18:00"],
["18:30","21:30"],
["22:00","11:00"]
],

Shitake:[
["12:00","15:00"],
["15:30","18:30"],
["19:00","22:00"],
["22:30","11:30"]
]

};

let currentSlot=null;

const bookings={};

for(let i=28;i<=31;i++){

calendar.innerHTML+=
`<div class="day ${i===28?'active':''}"
onclick="selectDay(this)">
${i}/5
</div>`;

}

for(let i=1;i<=30;i++){

calendar.innerHTML+=
`<div class="day"
onclick="selectDay(this)">
${i}/6
</div>`;

}

const bookingTable=
document.getElementById('bookingTable');

Object.entries(rooms).forEach(([room,times])=>{

bookingTable.innerHTML+=`

<tr>

<td class="room">
${room}
</td>

${times.map((time,index)=>`

<td>

<div class="slot"
id="${room}-${index}"
onclick="openPopup('${room}',${index})">

<div class="slot-time">
${time[0]} - ${time[1]}
</div>

<div class="slot-guest"
id="${room}-${index}-guest">
Trống
</div>

</div>

</td>

`).join('')}

</tr>

`;

});

function renderTimeline(){

const timeline=
document.getElementById('timeline');

timeline.innerHTML='';

const now=new Date();

const currentMinutes=
now.getHours()*60+now.getMinutes();

let items=[];

Object.entries(rooms).forEach(([room,times])=>{

times.forEach((time,index)=>{

const out=time[1];

let outHour=parseInt(out.split(':')[0]);
let outMinute=parseInt(out.split(':')[1]);

const outMinutes=
outHour*60+outMinute;

items.push({

room,
index,
out,
next:index<3
?times[index+1][0]
:'-',

status:
currentMinutes>=outMinutes
&& currentMinutes<outMinutes+60
?'red'
:'normal'

});

});

});

items.sort((a,b)=>{

const aTime=
parseInt(a.out.split(':')[0])*60+
parseInt(a.out.split(':')[1]);

const bTime=
parseInt(b.out.split(':')[0])*60+
parseInt(b.out.split(':')[1]);

return aTime-bTime;

});

items.forEach((item,i)=>{

const booking=
bookings[`${item.room}-${item.index}`];

timeline.innerHTML+=`

<div class="event ${item.status}"
id="event-${item.room}-${item.index}">

<div>

<div class="time">
OUT ${item.out}
</div>

<div class="event-title">
${item.room}
</div>

<div class="sub">
IN KHUNG SAU: ${item.next}
</div>

${booking
?`<div class="sub">
👤 ${booking.name}
</div>`
:''
}

${booking
?`<div class="sub">
🚨 Có khách khung sau
</div>`
:''
}

</div>

<div id="btn-${item.room}-${item.index}">

${item.status==='red'
?`<button
onclick="doneCleaning('${item.room}',${item.index})">
Đã dọn xong
</button>`
:''
}

</div>

</div>

`;

});

}

function doneCleaning(room,index){

const item=
document.getElementById(
`event-${room}-${index}`
);

item.classList.remove('red');

item.classList.add('green');

item.querySelector('.event-title')
.innerHTML+=` ✅ READY`;

item.querySelector('button')
.remove();

}

function selectDay(el){

document.querySelectorAll('.day')
.forEach(d=>d.classList.remove('active'));

el.classList.add('active');

}

function openPopup(room,index){

currentSlot={room,index};

document.getElementById('popup')
.style.display='flex';

document.getElementById('popupTitle')
.innerHTML=
`${room} - Ca ${index+1}`;

}

function saveBooking(){

const name=
document.getElementById('guestName').value;

const note=
document.getElementById('guestNote').value;

bookings[
`${currentSlot.room}-${currentSlot.index}`
]={
name,
note
};

document.getElementById(
`${currentSlot.room}-${currentSlot.index}`
).classList.add('active');

document.getElementById(
`${currentSlot.room}-${currentSlot.index}-guest`
).innerHTML=name;

document.getElementById('popup')
.style.display='none';

renderTimeline();

}

renderTimeline();

setInterval(renderTimeline,60000);

</script>

</body>
</html>
