```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🍄 Nấm Homestay</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#A8CFA8;
padding:16px;
color:white;
}

.header{
margin-bottom:20px;
}

.title{
font-size:32px;
font-weight:bold;
}

.subtitle{
opacity:0.9;
margin-top:6px;
}

.month{
font-size:22px;
font-weight:bold;
margin-bottom:12px;
}

.calendar{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:10px;
margin-bottom:20px;
}

.day{
min-width:80px;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.2);
text-align:center;
cursor:pointer;
font-weight:bold;
}

.day.active{
background:white;
color:#4d6b4d;
}

.layout{
display:grid;
gap:20px;
}

@media(min-width:1000px){

.layout{
grid-template-columns:1.1fr 0.9fr;
}

}

.section{
background:white;
color:#222;
border-radius:24px;
padding:18px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
}

.sheet{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
padding-bottom:14px;
text-align:center;
color:#777;
}

td{
padding:10px;
border-top:1px solid #eee;
text-align:center;
}

.room{
font-weight:bold;
text-align:left;
min-width:120px;
font-size:16px;
}

.slot{
background:#f5f5f5;
border-radius:14px;
padding:10px;
cursor:pointer;
min-width:150px;
}

.slot:hover{
background:#ececec;
}

.slot-time{
font-weight:bold;
font-size:15px;
color:#222;
}

.slot-guest{
margin-top:8px;
font-size:13px;
color:#555;
}

.timeline{
display:flex;
flex-direction:column;
gap:12px;
max-height:80vh;
overflow:auto;
}

.event{
padding:18px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
gap:14px;
transition:0.2s;
}

.normal{
background:#f5f5f5;
}

.red{
background:#ffc9c9;
}

.green{
background:#b2f2bb;
}

.left{
display:flex;
flex-direction:column;
gap:6px;
}

.time{
font-size:22px;
font-weight:bold;
color:#222;
}

.event-title{
font-size:20px;
font-weight:bold;
color:#222;
}

.sub{
font-size:14px;
font-weight:500;
color:#333;
}

button{
border:none;
padding:12px 16px;
border-radius:14px;
background:#2b8a3e;
color:white;
font-weight:bold;
cursor:pointer;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.popup-box{
background:white;
color:black;
width:100%;
max-width:420px;
border-radius:24px;
padding:20px;
}

.popup-title{
font-size:22px;
font-weight:bold;
margin-bottom:14px;
}

input,textarea{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:12px;
font-size:15px;
}

.save-btn{
width:100%;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
🍄 Nấm Homestay
</div>

<div class="subtitle">
Operation Dashboard
</div>

</div>

<div class="month">
May / June 2025
</div>

<div class="calendar" id="calendar"></div>

<div class="layout">

<div class="section">

<div class="section-title">
📋 Booking Sheet
</div>

<div class="sheet">

<table>

<tr>
<th>Room</th>
<th>Ca 1</th>
<th>Ca 2</th>
<th>Ca 3</th>
<th>Đêm</th>
</tr>

<tbody id="bookingTable"></tbody>

</table>

</div>

</div>

<div class="section">

<div class="section-title">
⏳ Timeline dọn phòng
</div>

<div class="timeline" id="timeline"></div>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<div class="popup-title" id="popupTitle">
Booking
</div>

<input id="guestInput" placeholder="Tên khách"/>

<textarea id="noteInput"
placeholder="Ghi chú"></textarea>

<button class="save-btn"
onclick="closePopup()">
Lưu
</button>

</div>

</div>

<script>

const rooms = {

Midori:[
"10:00 - 13:00",
"13:30 - 16:30",
"17:00 - 20:00",
"20:30 - 09:30"
],

Truffle:[
"10:30 - 13:30",
"14:00 - 17:00",
"17:30 - 20:30",
"21:00 - 10:00"
],

Matutake:[
"11:00 - 14:00",
"14:30 - 17:30",
"18:00 - 21:00",
"21:30 - 10:30"
],

Porcini:[
"11:30 - 14:30",
"15:00 - 18:00",
"18:30 - 21:30",
"22:00 - 11:00"
],

Shitake:[
"12:00 - 15:00",
"15:30 - 18:30",
"19:00 - 22:00",
"22:30 - 11:30"
]

};

const calendar=document.getElementById('calendar');

for(let i=28;i<=31;i++){

calendar.innerHTML+=
`<div class="day ${i===28?'active':''}"
onclick="selectDay(this)">
${i}/5
</div>`;

}

for(let i=1;i<=30;i++){

calendar.innerHTML+=
`<div class="day"
onclick="selectDay(this)">
${i}/6
</div>`;

}

const bookingTable=
document.getElementById('bookingTable');

Object.entries(rooms).forEach(([room,times])=>{

bookingTable.innerHTML+=`

<tr>

<td class="room">
${room}
</td>

${times.map((time,index)=>`

<td>

<div class="slot"
onclick="openPopup('${room} - Ca ${index+1}')">

<div class="slot-time">
${time}
</div>

<div class="slot-guest">
Trống
</div>

</div>

</td>

`).join('')}

</tr>

`;

});

const timeline=document.getElementById('timeline');

const timelineData=[

["Midori","13:00","14:00"],
["Truffle","13:30","14:30"],
["Matutake","14:00","15:00"],
["Porcini","14:30","15:30"],
["Shitake","15:00","16:00"],

["Midori","16:30","17:00"],
["Truffle","17:00","17:30"],
["Matutake","17:30","18:00"],
["Porcini","18:00","18:30"],
["Shitake","18:30","19:00"]

];

timelineData.forEach((item,index)=>{

timeline.innerHTML+=`

<div class="event normal"
id="event${index}">

<div class="left">

<div class="time">
OUT ${item[1]}
</div>

<div class="event-title">
${item[0]}
</div>

<div class="sub">
IN KHUNG SAU: ${item[2]}
</div>

</div>

<div id="btn${index}"></div>

</div>

`;

});

function selectDay(el){

document.querySelectorAll('.day')
.forEach(d=>d.classList.remove('active'));

el.classList.add('active');

}

function openPopup(title){

document.getElementById('popup')
.style.display='flex';

document.getElementById('popupTitle')
.innerHTML=title;

}

function closePopup(){

document.getElementById('popup')
.style.display='none';

}

function triggerCleaning(index){

const item=
document.getElementById(`event${index}`);

const btn=
document.getElementById(`btn${index}`);

item.classList.remove('normal');

item.classList.add('red');

btn.innerHTML=
`<button onclick="doneCleaning(${index})">
Đã dọn xong
</button>`;

}

function doneCleaning(index){

const item=
document.getElementById(`event${index}`);

const btn=
document.getElementById(`btn${index}`);

item.classList.remove('red');

item.classList.add('green');

item.querySelector('.event-title')
.innerHTML+=' ✅ READY';

btn.innerHTML='';

}

setTimeout(()=>triggerCleaning(0),2000);
setTimeout(()=>triggerCleaning(1),6000);

</script>

</body>
</html>
```
