<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🍄 Nấm Homestay</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
min-height:100vh;
padding:12px;
color:#333;
font-family:'Quicksand', sans-serif;
}

.header{
text-align:center;
margin-bottom:24px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.title{
font-size:42px;
font-weight:700;
background:linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
margin:0;
font-family:'Poppins', sans-serif;
letter-spacing:-0.5px;
}

.month-selector{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
margin:16px 0 0 0;
}

.month-btn{
padding:8px 14px;
border:2px solid #C8E6C9;
background:white;
color:#2E7D32;
border-radius:12px;
font-weight:600;
cursor:pointer;
transition:all 0.3s ease;
font-size:12px;
font-family:'Quicksand', sans-serif;
}

.month-btn:hover{
transform:translateY(-2px);
box-shadow:0 4px 12px rgba(46, 125, 50, 0.2);
}

.month-btn.active{
background:linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
color:white;
border-color:#1B5E20;
}

.calendar{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(45px, 1fr));
gap:8px;
margin:16px 0;
padding:16px;
background:white;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
max-width:100%;
}

.day{
padding:10px 6px;
border-radius:12px;
background:#F1F8F6;
text-align:center;
font-weight:600;
cursor:pointer;
transition:all 0.3s ease;
font-size:12px;
color:#2E7D32;
border:2px solid transparent;
font-family:'Quicksand', sans-serif;
}

.day:hover{
transform:scale(1.05);
background:#E0F2F1;
}

.day.active-date{
background:linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
color:white;
border-color:#1B5E20;
font-weight:700;
}

.layout{
display:grid;
gap:16px;
margin-bottom:20px;
}

@media(min-width:768px){
.layout{
grid-template-columns:1.2fr 0.8fr;
}
}

@media(max-width:767px){
.layout{
grid-template-columns:1fr;
}
}

.section{
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.section-title{
font-size:18px;
font-weight:700;
color:#333;
margin-bottom:14px;
display:flex;
align-items:center;
gap:8px;
font-family:'Poppins', sans-serif;
}

.sheet{
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
padding:10px 6px;
text-align:center;
color:#999;
font-weight:600;
border-bottom:2px solid #E8F5E9;
background:#FAFAFA;
font-family:'Quicksand', sans-serif;
}

td{
padding:8px 4px;
border-bottom:1px solid #E8F5E9;
text-align:center;
}

.room{
font-weight:700;
text-align:left;
min-width:80px;
font-size:14px;
color:#2E7D32;
background:#F1F8F6;
position:sticky;
left:0;
z-index:2;
padding:8px 10px;
border-radius:8px;
font-family:'Poppins', sans-serif;
}

.slot{
background:#F1F8F6;
border-radius:10px;
padding:8px 4px;
cursor:pointer;
min-width:120px;
transition:all 0.3s ease;
border:2px solid transparent;
font-size:12px;
}

.slot:hover{
background:#E0F2F1;
border-color:#2E7D32;
}

.slot.booked{
background:linear-gradient(135deg, #FFF9C4 0%, #FFEE58 100%);
border:2px solid #FDD835;
box-shadow:0 2px 8px rgba(253, 216, 53, 0.3);
}

.slot.checkedin{
background:linear-gradient(135deg, #C8E6C9 0%, #A5D6A7 100%);
border:2px solid #66BB6A;
box-shadow:0 2px 8px rgba(102, 187, 106, 0.3);
}

.slot-time{
font-weight:700;
font-size:12px;
color:#2E7D32;
font-family:'Poppins', sans-serif;
}

.slot-guest{
margin-top:4px;
font-size:11px;
color:#666;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.timeline{
display:flex;
flex-direction:column;
gap:10px;
max-height:70vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.event{
padding:14px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
font-size:13px;
transition:all 0.3s ease;
}

.event.yellow{
background:linear-gradient(135deg, #FFF9C4 0%, #FFEE58 100%);
border-left:4px solid #FDD835;
box-shadow:0 2px 8px rgba(253, 216, 53, 0.2);
order:2;
}

.event.red{
background:linear-gradient(135deg, #FFEBEE 0%, #FFCDD2 100%);
border-left:4px solid #E57373;
box-shadow:0 2px 8px rgba(229, 115, 115, 0.2);
order:1;
}

.event.white{
background:#F5F5F5;
border-left:4px solid #DDD;
box-shadow:0 2px 8px rgba(0, 0, 0, 0.05);
order:3;
}

.timeline{
display:flex;
flex-direction:column;
gap:10px;
max-height:70vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.event-content{
flex:1;
}

.time{
font-size:16px;
font-weight:700;
color:#1B5E20;
font-family:'Poppins', sans-serif;
}

.event.white .time{
color:#999;
}

.event-title{
font-size:15px;
font-weight:700;
color:#333;
margin-top:4px;
font-family:'Poppins', sans-serif;
}

.event.white .event-title{
color:#999;
}

.sub{
font-size:12px;
color:#666;
margin-top:4px;
}

.event.white .sub{
color:#AAA;
font-style:italic;
}

.event-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
border:none;
padding:8px 12px;
border-radius:10px;
background:linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
color:white;
font-weight:600;
cursor:pointer;
transition:all 0.3s ease;
font-size:12px;
white-space:nowrap;
font-family:'Quicksand', sans-serif;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 4px 12px rgba(46, 125, 50, 0.3);
}

button:active{
transform:translateY(0);
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
padding:16px;
z-index:999;
-webkit-overflow-scrolling:touch;
}

.popup-box{
background:white;
color:#333;
width:100%;
max-width:400px;
border-radius:20px;
padding:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
animation:slideUp 0.3s ease;
max-height:90vh;
overflow-y:auto;
}

@keyframes slideUp{
from{
  transform:translateY(20px);
  opacity:0;
}
to{
  transform:translateY(0);
  opacity:1;
}
}

.popup-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.popup-title{
font-size:18px;
font-weight:700;
color:#2E7D32;
font-family:'Poppins', sans-serif;
}

.btn-close{
background:#E8F5E9 !important;
color:#333 !important;
padding:6px 10px !important;
margin:0 !important;
font-size:16px;
}

.btn-close:hover{
background:#C8E6C9 !important;
}

input,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid #C8E6C9;
margin-bottom:12px;
font-size:14px;
font-family:'Quicksand', sans-serif;
transition:all 0.3s ease;
}

input:focus,textarea:focus{
outline:none;
border-color:#2E7D32;
box-shadow:0 0 0 3px rgba(46, 125, 50, 0.1);
background:#FFFBFE;
}

.button-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:16px;
}

.btn-save{
background:linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
grid-column:1 / -1;
}

.btn-delete{
background:#E57373;
}

.btn-delete:hover{
background:#EF5350;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
gap:12px;
margin-top:14px;
padding-top:14px;
border-top:2px solid #E8F5E9;
}

.stat-item{
background:linear-gradient(135deg, #F1F8F6 0%, #E8F5E9 100%);
padding:12px;
border-radius:12px;
text-align:center;
}

.stat-label{
font-size:12px;
color:#999;
font-weight:600;
font-family:'Quicksand', sans-serif;
}

.stat-value{
font-size:20px;
font-weight:700;
color:#2E7D32;
margin-top:4px;
font-family:'Poppins', sans-serif;
}

.export-btn{
background:linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
width:100%;
margin-top:12px !important;
}

.export-btn:hover{
transform:translateY(-2px);
box-shadow:0 4px 12px rgba(46, 125, 50, 0.3);
}

@media(max-width:480px){
.title{
font-size:32px;
}

table{
font-size:11px;
}

.slot{
min-width:100px;
padding:6px 2px;
}

.event{
padding:10px;
font-size:12px;
}

.time{
font-size:14px;
}

button{
font-size:11px;
padding:6px 10px;
}

.button-group{
grid-template-columns:1fr;
}

.btn-delete{
grid-column:1 / -1;
}
}

</style>
</head>

<body>

<div class="header">
<div>
  <h1 class="title">🍄 Nấm Homestay</h1>
</div>

<div class="month-selector" id="monthSelector"></div>
</div>

<div class="calendar" id="calendar"></div>

<div class="layout">

<div class="section">

<div class="section-title">
📋 Booking Sheet
</div>

<div class="sheet">
<table>
<tr>
<th>Room</th>
<th>Ca 1</th>
<th>Ca 2</th>
<th>Ca 3</th>
<th>Đêm</th>
</tr>
<tbody id="bookingTable"></tbody>
</table>
</div>

<div class="stats" id="stats"></div>
<button class="export-btn" onclick="exportToExcel()">📊 Xuất Excel</button>

</div>

<div class="section">

<div class="section-title">
⏳ Danh sách booking
</div>

<div class="timeline" id="timeline"></div>

</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<div class="popup-header">
  <div class="popup-title" id="popupTitle">Booking</div>
  <button class="btn-close" onclick="closePopup()">✕</button>
</div>

<input id="guestName" placeholder="Tên khách"/>
<textarea id="guestNote" placeholder="Ghi chú" rows="3"></textarea>

<div class="button-group">
  <button class="btn-save" onclick="saveBooking()">Lưu booking</button>
  <button class="btn-delete" onclick="deleteBooking()" style="display:none;">Xóa booking</button>
</div>

</div>
</div>

<script>

const rooms={
Midori:[
["10:00","13:00"],
["13:30","16:30"],
["17:00","20:00"],
["20:30","09:30"]
],
Truffle:[
["10:30","13:30"],
["14:00","17:00"],
["17:30","20:30"],
["21:00","10:00"]
],
Matutake:[
["11:00","14:00"],
["14:30","17:30"],
["18:00","21:00"],
["21:30","10:30"]
],
Porcini:[
["11:30","14:30"],
["15:00","18:00"],
["18:30","21:30"],
["22:00","11:00"]
],
Shitake:[
["12:00","15:00"],
["15:30","18:30"],
["19:00","22:00"],
["22:30","11:30"]
]
};

let bookings={};
let currentSlot=null;
let selectedDate=new Date();
let cleanedSlots={};

const months=[
{ name:'May', month:5, days:31 },
{ name:'June', month:6, days:30 },
{ name:'July', month:7, days:31 },
{ name:'August', month:8, days:31 },
{ name:'September', month:9, days:30 },
{ name:'October', month:10, days:31 },
{ name:'November', month:11, days:30 },
{ name:'December', month:12, days:31 }
];

let currentMonth=new Date().getMonth()+1;

// Load dữ liệu từ localStorage
function loadData(){
  const saved=localStorage.getItem('bookings');
  const cleanedSaved=localStorage.getItem('cleanedSlots');
  if(saved){
    try{
      bookings=JSON.parse(saved);
    }catch(e){
      console.error('Error loading bookings:', e);
    }
  }
  if(cleanedSaved){
    try{
      cleanedSlots=JSON.parse(cleanedSaved);
    }catch(e){
      console.error('Error loading cleaned slots:', e);
    }
  }
}

// Lưu dữ liệu vào localStorage
function saveData(){
  localStorage.setItem('bookings', JSON.stringify(bookings));
  localStorage.setItem('cleanedSlots', JSON.stringify(cleanedSlots));
}

// Khởi tạo
loadData();
renderMonthSelector();
renderCalendar(currentMonth);
renderBookingSheet();
renderTimeline();
updateStats();

function renderMonthSelector(){
  const selector=document.getElementById('monthSelector');
  selector.innerHTML='';
  
  months.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='month-btn' + (m.month===currentMonth ? ' active' : '');
    btn.textContent=m.name;
    btn.onclick=()=>changeMonth(m.month);
    selector.appendChild(btn);
  });
}

function changeMonth(month){
  currentMonth=month;
  renderMonthSelector();
  renderCalendar(month);
}

function renderCalendar(month){
  const calendar=document.getElementById('calendar');
  calendar.innerHTML='';
  
  const selected=months.find(m=>m.month===month);
  
  const today=new Date();
  const isCurrentMonth=today.getMonth()+1===month;
  const todayDate=today.getDate();
  
  for(let i=1;i<=selected.days;i++){
    const dayEl=document.createElement('div');
    dayEl.className='day' + (isCurrentMonth && i===todayDate ? ' active-date' : '');
    dayEl.textContent=i;
    dayEl.onclick=()=>selectDate(i, month, dayEl);
    calendar.appendChild(dayEl);
  }
}

function selectDate(day, month, el){
  document.querySelectorAll('.day').forEach(d=>d.classList.remove('active-date'));
  el.classList.add('active-date');
  selectedDate=new Date(2025, month-1, day);
  renderBookingSheet();
  renderTimeline();
  updateStats();
}

function getDateKey(date=selectedDate){
  const year=date.getFullYear();
  const month=String(date.getMonth()+1).padStart(2,'0');
  const day=String(date.getDate()).padStart(2,'0');
  return `${year}-${month}-${day}`;
}

const bookingTable=document.getElementById('bookingTable');

Object.entries(rooms).forEach(([room,times])=>{
  const row=document.createElement('tr');
  
  let html=`<td class="room">${room}</td>`;
  
  times.forEach((time,index)=>{
    html+=`
    <td>
      <div class="slot" id="${room}-${index}" onclick="openPopup('${room}',${index})">
        <div class="slot-time">${time[0]} - ${time[1]}</div>
        <div class="slot-guest" id="${room}-${index}-guest">Trống</div>
      </div>
    </td>
    `;
  });
  
  row.innerHTML=html;
  bookingTable.appendChild(row);
});

// Render lại booking sheet sau khi load
renderBookingSheet();

function timeToMinutes(time){
  let h=parseInt(time.split(':')[0]);
  let m=parseInt(time.split(':')[1]);
  return h*60+m;
}

function renderTimeline(){
  const timeline=document.getElementById('timeline');
  timeline.innerHTML='';
  
  const now=new Date();
  const currentMinutes=now.getHours()*60+now.getMinutes();
  
  const dateKey=getDateKey();
  let items=[];
  
  Object.entries(rooms).forEach(([room,times])=>{
    times.forEach((time,index)=>{
      const inTime=time[0];
      const outTime=time[1];
      const nextIndex=(index+1)%times.length;
      const nextInTime=times[nextIndex][0];
      
      const inMinutes=timeToMinutes(inTime);
      const outMinutes=timeToMinutes(outTime);
      
      const bookingKey=`${dateKey}-${room}-${index}`;
      const booking=bookings[bookingKey];
      const isCleaned=cleanedSlots[bookingKey];
      
      if(booking){
        let status='yellow';
        let priority=2;
        let sortTime=inMinutes;
        
        if(isCleaned){
          // Đã dọn xong
          status='white';
          priority=3;
        }else if(currentMinutes>=outMinutes){
          // Cần dọn ngay
          status='red';
          priority=1;
          sortTime=outMinutes;
        }
        
        items.push({
          room,
          index,
          inTime,
          outTime,
          nextInTime,
          booking,
          bookingKey,
          status,
          priority,
          isCleaned,
          sortTime
        });
      }
    });
  });
  
  // Sắp xếp: Đỏ (priority 1) -> Vàng (priority 2) -> Trắng (priority 3)
  // Trong cùng priority, sắp xếp theo thời gian
  items.sort((a,b)=>{
    if(a.priority!==b.priority) return a.priority-b.priority;
    return a.sortTime-b.sortTime;
  });
  
  if(items.length===0){
    timeline.innerHTML='<div style="text-align:center;color:#999;padding:20px;">Không có booking</div>';
    return;
  }
  
  const timelineEl=document.getElementById('timeline');
  timelineEl.style.display='flex';
  timelineEl.style.flexDirection='column';
  
  items.forEach(item=>{
    const eventDiv=document.createElement('div');
    eventDiv.className=`event ${item.status}`;
    
    let statusText='';
    let buttonHtml='';
    
    if(item.status==='white'){
      statusText='✓ Đã dọn xong';
    }else if(item.status==='yellow'){
      statusText='🟡 Chờ check-out lúc '+item.outTime;
    }else if(item.status==='red'){
      statusText='🔴 CẦN DỌN NGAY';
      buttonHtml=`<button onclick="doneCleaning('${item.room}',${item.index})">Đã dọn xong</button>`;
    }
    
    let html=`
    <div class="event-content">
      <div class="time">${item.inTime} - ${item.outTime}</div>
      <div class="event-title">${item.room}</div>
      <div class="sub">👤 ${item.booking.name}</div>
      <div class="sub">${statusText}</div>
      ${item.status==='red' ? `<div class="sub">⏰ Khách tiếp: ${item.nextInTime}</div>` : ''}
    </div>
    <div class="event-buttons">
      ${buttonHtml}
    </div>
    `;
    
    eventDiv.innerHTML=html;
    timelineEl.appendChild(eventDiv);
  });
}

function renderBookingSheet(){
  const dateKey=getDateKey();
  
  Object.entries(rooms).forEach(([room,times])=>{
    times.forEach((time,index)=>{
      const slot=document.getElementById(`${room}-${index}`);
      const guestEl=document.getElementById(`${room}-${index}-guest`);
      
      if(slot){
        slot.className='slot';
        
        const bookingKey=`${dateKey}-${room}-${index}`;
        const booking=bookings[bookingKey];
        
        if(booking){
          if(booking.checkedIn){
            slot.classList.add('checkedin');
            guestEl.textContent=booking.name + ' ✓';
          }else{
            slot.classList.add('booked');
            guestEl.textContent=booking.name;
          }
        }else{
          guestEl.textContent='Trống';
        }
      }
    });
  });
}

function updateStats(){
  const dateKey=getDateKey();
  const stats=document.getElementById('stats');
  
  let booked=0;
  let checked=0;
  let empty=0;
  
  Object.entries(rooms).forEach(([room,times])=>{
    times.forEach((time,index)=>{
      const bookingKey=`${dateKey}-${room}-${index}`;
      const booking=bookings[bookingKey];
      
      if(booking){
        booked++;
        if(booking.checkedIn) checked++;
      }else{
        empty++;
      }
    });
  });
  
  stats.innerHTML=`
  <div class="stat-item">
    <div class="stat-label">Đã book</div>
    <div class="stat-value">${booked}</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Đã check-in</div>
    <div class="stat-value">${checked}</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Còn trống</div>
    <div class="stat-value">${empty}</div>
  </div>
  `;
}

function doneCleaning(room,index){
  const dateKey=getDateKey();
  const bookingKey=`${dateKey}-${room}-${index}`;
  cleanedSlots[bookingKey]=true;
  saveData();
  renderTimeline();
}

function openPopup(room,index){
  currentSlot={room,index};
  
  const dateKey=getDateKey();
  const bookingKey=`${dateKey}-${room}-${index}`;
  const booking=bookings[bookingKey];
  
  document.getElementById('popup').style.display='flex';
  document.getElementById('popupTitle').innerHTML=`${room} - Ca ${index+1}`;
  
  if(booking){
    document.getElementById('guestName').value=booking.name;
    document.getElementById('guestNote').value=booking.note||'';
    document.querySelector('.btn-delete').style.display='block';
  }else{
    document.getElementById('guestName').value='';
    document.getElementById('guestNote').value='';
    document.querySelector('.btn-delete').style.display='none';
  }
}

function closePopup(){
  document.getElementById('popup').style.display='none';
}

function saveBooking(){
  const name=document.getElementById('guestName').value;
  const note=document.getElementById('guestNote').value;
  
  if(!name.trim()){
    alert('Vui lòng nhập tên khách');
    return;
  }
  
  const dateKey=getDateKey();
  const bookingKey=`${dateKey}-${currentSlot.room}-${currentSlot.index}`;
  
  bookings[bookingKey]={
    name,
    note,
    checkedIn:false,
    cleaned:false,
    createdAt:new Date().toISOString()
  };
  
  saveData();
  closePopup();
  renderTimeline();
  renderBookingSheet();
  updateStats();
}

function deleteBooking(){
  if(confirm('Bạn chắc chắn muốn xóa booking này?')){
    const dateKey=getDateKey();
    const bookingKey=`${dateKey}-${currentSlot.room}-${currentSlot.index}`;
    delete bookings[bookingKey];
    delete cleanedSlots[bookingKey];
    saveData();
    closePopup();
    renderTimeline();
    renderBookingSheet();
    updateStats();
  }
}

function exportToExcel(){
  const dateKey=getDateKey();
  const date=new Date(selectedDate);
  const dateStr=date.toLocaleDateString('vi-VN');
  
  let csvContent='Nấm Homestay - Báo cáo booking\n';
  csvContent+=`Ngày: ${dateStr}\n\n`;
  
  csvContent+='Phòng,Ca,Giờ,Tên khách,Ghi chú,Trạng thái\n';
  
  Object.entries(rooms).forEach(([room,times])=>{
    times.forEach((time,index)=>{
      const bookingKey=`${dateKey}-${room}-${index}`;
      const booking=bookings[bookingKey];
      
      const caNum=index+1;
      const status=booking ? (booking.checkedIn ? 'Checked-in' : 'Booked') : 'Trống';
      const guestName=booking ? booking.name : '-';
      const guestNote=booking ? (booking.note || '-') : '-';
      
      csvContent+=`${room},Ca ${caNum},${time[0]}-${time[1]},${guestName},"${guestNote}",${status}\n`;
    });
  });
  
  const blob=new Blob(['\ufeff'+csvContent], {type:'text/csv;charset=utf-8;'});
  const link=document.createElement('a');
  const url=URL.createObjectURL(blob);
  
  link.setAttribute('href', url);
  link.setAttribute('download', `NAM_HOMESTAY_${dateKey}.csv`);
  link.style.visibility='hidden';
  
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// Update timeline mỗi phút
setInterval(()=>{
  renderTimeline();
}, 60000);

</script>
